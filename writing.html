<!doctype html>
<html>
<head>
  <meta charset="utf-8">

  <style>
    body {
      margin: 0;
      min-height: 140vh;
      background: #f4f1ea;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      color: #111;
    }

  img {
    position: fixed;
    top: 0;
    left: 0;

    width: 100vw;
    height: auto;

    transform: scaleY(.42);
    transform-origin: top left;
}
#bg-video {
    position: fixed;

    left: 55vw;
    top: -5vh;

    height: 120vh;
    width: auto;

    z-index: 1;

    pointer-events: none;
}
.side-image {
    position: fixed;
    left: 0;
    top: 0;

    height: 100vh;
    width: auto;

    z-index: 1;
    pointer-events: none;
}

.writing {
    margin-left: 4vw;
    margin-top: 20vh;
    max-width: 650px;
}

.entry {
    margin-bottom: 28px;
}

.entry a {
    display: block;
    color: white;
    font-size: 22px;
    text-decoration: none;
}

.entry a:hover {
    opacity: .6;
}

.entry span {
    display: block;
    margin-top: 4px;
    color: rgba(255,255,255,.65);
    font-size: 13px;
}
iframe {
    width:100%;
    height:100%;
    border:0;
}
    main {
      position: relative;
      z-index: 2;
      padding: 24px;
    }

   h1 {
    font-family: "Arial", Arial, sans-serif;

    font-size: clamp(4rem, 11vw, 10rem);

    font-weight: 100;

    color: black;

    margin: 0;

    line-height: .82;

    letter-spacing: -.08em;

    text-transform: uppercase;
}
    a {
      color: #ffffff;
      text-decoration: none;
      display: block;
      width: fit-content;
      margin-bottom: 9px;
    }

    a:hover {
      text-decoration: underline;
    }

    .links {
      margin-left: 4vw;
      margin-top: 20vh;
      font-size: 15px;
    }

    .note {
      position: absolute;
      top: 92vh;
      left: 62vw;
      max-width: 220px;
      line-height: 1.35;
    }

  </style>
</head>

<body>
  
  <img src="background.jpeg" alt="">


  <video autoplay muted loop playsinline id="bg-video">
    <source src="background.mp4" type="video/mp4">
</video>
<img class="side-image" src="side-image.jpeg" alt="">
  <main>
    

    <div class="writing">


    <div class="entry">
        <a href="https://www.midcult.net/poems-ryan-riffenburgh" target="_blank">
            3 Poems
        </a>
        <span>Midcult · 2026</span>
    </div>

    <div class="entry">
        <a href="https://www.cultmag.net/blog-1/kinship-through-pharmacology" target="_blank">
            Kinship Through Pharmacology
        </a>
        <span>CULT Magazine · 2026</span>
    </div>

    <div class="entry">
        <a href="https://larbpublab.org/author/ryan-riffenburgh/" target="_blank">
            Ekphrasis of Tony Conrad's "Four Violins"
        </a>
        <span>Los Angeles Review of Books · 2025</span>
    </div>
 <div class="entry">
        <a href="https://www.swampspit.com/swamp/2024/march-2024/ryan-riffenburgh" target="_blank">
            Thai Boxing
        </a>
        <span>Swampspit · March 2024</span>
    </div>

    <div class="entry">
        <a href="https://highhorse.blog/2024/02/24/5-poems-by-ryan-riffenburgh/" target="_blank">
            Five Poems
        </a>
        <span>High Horse · February 2024</span>
    </div>
</div>

    
</div>

    
  </main>
</body>
</html>
